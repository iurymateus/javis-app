<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <title>J.A.R.V.I.S. — Assistente Pessoal</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a0a1a; color: #e0e7ff; }
    :root {
      --bg: #0a0a1a; --bg2: #12122a; --bg3: #1a1a3a;
      --primary: #00e5ff; --primary-dim: rgba(0,229,255,0.15); --primary-glow: rgba(0,229,255,0.3);
      --secondary: #7c3aed; --text: #e0e7ff; --text-dim: #6b7280;
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --radius: 16px; --radius-sm: 10px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --nav-height: 64px; --header-height: 56px; --input-height: 56px;
    }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--primary-dim); border-radius: 4px; }

    /* ===== APP SHELL ===== */
    .app { height: 100%; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; }
    header {
      height: var(--header-height); display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; background: var(--bg2); border-bottom: 1px solid rgba(0,229,255,0.1);
      position: relative; z-index: 10; flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #00e5ff, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
    header .status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
    header .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ===== PAGES ===== */
    .page-container { flex: 1; overflow: hidden; position: relative; }
    .page { display: none; height: 100%; overflow-y: auto; padding: 16px 16px 80px; animation: fadeIn 0.3s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== BOTTOM NAV ===== */
    nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      height: calc(var(--nav-height) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: linear-gradient(180deg, rgba(10,10,26,0.95) 0%, rgba(18,18,42,0.98) 100%);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,229,255,0.08); display: flex; align-items: center; justify-content: space-around;
      max-width: 480px; margin: 0 auto; left: 50%; transform: translateX(-50%);
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 4px 8px; cursor: pointer; transition: 0.2s; border: none; background: none; color: var(--text-dim); font-size: 10px; font-family: inherit; min-width: 56px; }
    .nav-item .icon { font-size: 22px; line-height: 1; transition: 0.2s; }
    .nav-item.active { color: var(--primary); }
    .nav-item.active .icon { filter: drop-shadow(0 0 8px var(--primary-glow)); }

    /* ===== COMMAND BAR ===== */
    .cmd-bar {
      position: fixed; bottom: calc(var(--nav-height) + var(--safe-bottom) + 4px);
      left: 50%; transform: translateX(-50%); z-index: 90;
      width: calc(100% - 32px); max-width: 448px;
      display: flex; align-items: center; gap: 8px;
      background: rgba(26,26,58,0.9); backdrop-filter: blur(16px);
      border: 1px solid rgba(0,229,255,0.15); border-radius: 50px;
      padding: 6px 6px 6px 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px rgba(0,229,255,0.05);
    }
    .cmd-bar input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 14px; font-family: inherit;
      padding: 8px 0; min-width: 0;
    }
    .cmd-bar input::placeholder { color: var(--text-dim); font-size: 13px; }
    .cmd-bar button {
      width: 42px; height: 42px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff; font-size: 18px; cursor: pointer; transition: 0.2s;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px rgba(0,229,255,0.2);
    }
    .cmd-bar button:active { transform: scale(0.92); }

    /* ===== COMMON COMPONENTS ===== */
    .card { background: var(--bg2); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid rgba(0,229,255,0.06); transition: 0.2s; }
    .card:active { transform: scale(0.98); }

    .badge { display: inline-block; padding: 2px 10px; border-radius: 50px; font-size: 11px; font-weight: 600; }
    .badge-high { background: rgba(239,68,68,0.2); color: var(--danger); }
    .badge-medium { background: rgba(245,158,11,0.2); color: var(--warning); }
    .badge-low { background: rgba(16,185,129,0.2); color: var(--success); }
    .badge-done { background: rgba(16,185,129,0.15); color: var(--success); text-decoration: line-through; }

    .btn-icon { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--bg3); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.15s; }
    .btn-icon:active { transform: scale(0.9); }
    .btn-icon.danger { color: var(--danger); }
    .btn-icon.success { color: var(--success); }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; display: block; }

    /* ===== DASHBOARD ===== */
    .greeting { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .sub-greeting { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .stat-card { background: var(--bg2); border-radius: var(--radius-sm); padding: 14px 10px; text-align: center; border: 1px solid rgba(0,229,255,0.06); }
    .stat-card .num { font-size: 24px; font-weight: 800; color: var(--primary); }
    .stat-card .label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .section-title { font-size: 14px; font-weight: 600; margin: 16px 0 10px; color: var(--text); display: flex; align-items: center; gap: 6px; }

    /* ===== TASKS ===== */
    .task-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .task-item:last-child { border-bottom: none; }
    .task-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.15s; background: none; }
    .task-check.done { border-color: var(--success); background: var(--success); }
    .task-check.done::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 700; }
    .task-info { flex: 1; min-width: 0; }
    .task-title { font-size: 14px; font-weight: 500; }
    .task-title.done { text-decoration: line-through; color: var(--text-dim); }
    .task-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; display: flex; gap: 8px; }
    .task-actions { display: flex; gap: 4px; }

    .add-card { border: 1px dashed rgba(0,229,255,0.15); cursor: pointer; text-align: center; color: var(--text-dim); font-size: 13px; padding: 14px; border-radius: var(--radius-sm); transition: 0.2s; margin-top: 8px; }
    .add-card:hover { border-color: var(--primary-dim); color: var(--primary); }

    /* ===== REMINDERS ===== */
    .reminder-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .reminder-time { font-size: 12px; font-weight: 700; color: var(--primary); min-width: 48px; }
    .reminder-info { flex: 1; }
    .reminder-title { font-size: 14px; }
    .reminder-date { font-size: 11px; color: var(--text-dim); }

    /* ===== NOTES ===== */
    .notes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .note-card { background: var(--bg2); border-radius: var(--radius-sm); padding: 14px; border: 1px solid rgba(0,229,255,0.06); position: relative; min-height: 80px; }
    .note-card .note-text { font-size: 13px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    .note-card .note-date { font-size: 10px; color: var(--text-dim); margin-top: 8px; }
    .note-card .note-del { position: absolute; top: 6px; right: 6px; }

    /* ===== AGENDA ===== */
    .agenda-today-label { font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 12px; }
    .agenda-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); align-items: flex-start; }
    .agenda-time { font-size: 12px; font-weight: 600; color: var(--text-dim); min-width: 44px; padding-top: 2px; }
    .agenda-content { flex: 1; }
    .agenda-type { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--secondary); font-weight: 600; }
    .agenda-title { font-size: 14px; }

    /* ===== MODAL ===== */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 200; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg2); border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-width: 480px; max-height: 85vh; padding: 24px 20px calc(20px + var(--safe-bottom)); overflow-y: auto; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal h2 { font-size: 18px; margin-bottom: 16px; }
    .modal input, .modal textarea, .modal select {
      width: 100%; padding: 12px 14px; border-radius: var(--radius-sm); border: 1px solid rgba(0,229,255,0.12);
      background: var(--bg3); color: var(--text); font-size: 14px; font-family: inherit; margin-bottom: 12px; outline: none; transition: 0.15s;
    }
    .modal input:focus, .modal textarea:focus { border-color: var(--primary); }
    .modal textarea { min-height: 80px; resize: vertical; }
    .modal .row { display: flex; gap: 10px; }
    .modal .row > * { flex: 1; }
    .modal .btn-primary {
      width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: 0.15s;
    }
    .modal .btn-primary:active { transform: scale(0.97); }
    .modal .btn-secondary {
      width: 100%; padding: 14px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.08);
      background: transparent; color: var(--text-dim); font-size: 14px; cursor: pointer; font-family: inherit; margin-top: 8px;
    }

    /* ===== NOTIFICATION TOAST ===== */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 300;
      background: var(--bg2); border: 1px solid rgba(0,229,255,0.15); border-radius: var(--radius-sm);
      padding: 14px 20px; color: var(--text); font-size: 13px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4); display: none;
      max-width: calc(100% - 40px); text-align: center;
      backdrop-filter: blur(12px);
    }
    .toast.show { display: block; animation: toastIn 0.3s ease; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>

<div class="app" id="app">
  <!-- Header -->
  <header>
    <h1>✦ J.A.R.V.I.S.</h1>
    <div class="status">
      <span class="status-dot"></span>
      <span>Online</span>
    </div>
  </header>

  <!-- Pages -->
  <div class="page-container">
    <!-- Dashboard -->
    <div class="page active" id="page-dashboard">
      <div class="greeting" id="greeting">Olá, Iury</div>
      <div class="sub-greeting" id="subGreeting">Aqui está seu resumo do dia</div>
      <div class="stats-row">
        <div class="stat-card"><div class="num" id="statTasks">0</div><div class="label">Tarefas</div></div>
        <div class="stat-card"><div class="num" id="statReminders">0</div><div class="label">Lembretes</div></div>
        <div class="stat-card"><div class="num" id="statNotes">0</div><div class="label">Notas</div></div>
      </div>
      <div class="section-title">⚡ Próximos lembretes</div>
      <div id="dashboardReminders"><div class="empty-state">Nenhum lembrete hoje</div></div>
      <div class="section-title">📋 Tarefas pendentes</div>
      <div id="dashboardTasks"><div class="empty-state">Nenhuma tarefa pendente</div></div>
    </div>

    <!-- Tasks -->
    <div class="page" id="page-tasks">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="section-title" style="margin:0;">📋 Tarefas</div>
        <button class="btn-icon success" onclick="openTaskModal()" style="width:auto;padding:6px 14px;border-radius:50px;gap:4px;font-size:13px;">+ Nova</button>
      </div>
      <div id="tasksList"></div>
      <div class="add-card" onclick="openTaskModal()">+ Adicionar tarefa</div>
    </div>

    <!-- Reminders -->
    <div class="page" id="page-reminders">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="section-title" style="margin:0;">🔔 Lembretes</div>
        <button class="btn-icon success" onclick="openReminderModal()" style="width:auto;padding:6px 14px;border-radius:50px;gap:4px;font-size:13px;">+ Novo</button>
      </div>
      <div id="remindersList"></div>
      <div class="add-card" onclick="openReminderModal()">+ Adicionar lembrete</div>
    </div>

    <!-- Notes -->
    <div class="page" id="page-notes">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="section-title" style="margin:0;">📝 Notas</div>
        <button class="btn-icon success" onclick="openNoteModal()" style="width:auto;padding:6px 14px;border-radius:50px;gap:4px;font-size:13px;">+ Nova</button>
      </div>
      <div class="notes-grid" id="notesGrid"></div>
      <div class="add-card" onclick="openNoteModal()" style="margin-top:0;">+ Adicionar nota</div>
    </div>

    <!-- Agenda -->
    <div class="page" id="page-agenda">
      <div class="section-title" style="margin:0 0 4px;">📅 Agenda</div>
      <div class="agenda-today-label" id="agendaDate">Hoje</div>
      <div id="agendaList"></div>
    </div>
  </div>

  <!-- Command Bar -->
  <div class="cmd-bar">
    <input type="text" id="cmdInput" placeholder="O que você precisa, Iury?" autocomplete="off" />
    <button onclick="processCommand()">➤</button>
  </div>

  <!-- Bottom Nav -->
  <nav>
    <button class="nav-item active" data-page="dashboard"><span class="icon">🏠</span>Início</button>
    <button class="nav-item" data-page="tasks"><span class="icon">📋</span>Tarefas</button>
    <button class="nav-item" data-page="reminders"><span class="icon">🔔</span>Lembretes</button>
    <button class="nav-item" data-page="notes"><span class="icon">📝</span>Notas</button>
    <button class="nav-item" data-page="agenda"><span class="icon">📅</span>Agenda</button>
  </nav>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
  // ===== DATA STORE =====
  const Store = {
    get() {
      try {
        const d = localStorage.getItem('jarvis_data');
        return d ? JSON.parse(d) : { tasks: [], reminders: [], notes: [] };
      } catch { return { tasks: [], reminders: [], notes: [] }; }
    },
    set(data) { localStorage.setItem('jarvis_data', JSON.stringify(data)); },
    getTasks() { return this.get().tasks; },
    getReminders() { return this.get().reminders; },
    getNotes() { return this.get().notes; },
    saveTasks(t) { const d = this.get(); d.tasks = t; this.set(d); },
    saveReminders(r) { const d = this.get(); d.reminders = r; this.set(d); },
    saveNotes(n) { const d = this.get(); d.notes = n; this.set(d); }
  };

  // ===== HELPERS =====
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
  function today() { return new Date().toISOString().slice(0,10); }
  function now() { return new Date().toISOString(); }
  function fmtTime(iso) { const d = new Date(iso); return d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}); }
  function fmtDate(iso) { const d = new Date(iso); return d.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'}); }
  function fmtDateFull(iso) { const d = new Date(iso); return d.toLocaleDateString('pt-BR', {weekday:'long',day:'numeric',month:'long'}); }

  // ===== TOAST =====
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ===== MODAL =====
  function openModal(html) {
    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modalOverlay').classList.add('open');
  }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });

  // ===== NAVIGATION =====
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      const page = document.getElementById('page-' + btn.dataset.page);
      if (page) { page.classList.add('active'); renderAll(); }
    });
  });

  function goToPage(name) {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelector(`.nav-item[data-page="${name}"]`)?.classList.add('active');
    document.getElementById('page-' + name)?.classList.add('active');
    renderAll();
  }

  // ===== RENDER =====
  function renderAll() {
    renderDashboard(); renderTasks(); renderReminders(); renderNotes(); renderAgenda();
  }

  function renderDashboard() {
    const tasks = Store.getTasks();
    const reminders = Store.getReminders();
    const notes = Store.getNotes();

    const pending = tasks.filter(t => !t.done);
    document.getElementById('statTasks').textContent = pending.length;
    document.getElementById('statReminders').textContent = reminders.filter(r => !r.done).length;
    document.getElementById('statNotes').textContent = notes.length;

    // Greeting
    const h = new Date().getHours();
    let g = 'Boa noite';
    if (h &lt; 12) g = 'Bom dia';
    else if (h &lt; 18) g = 'Boa tarde';
    document.getElementById('greeting').textContent = `${g}, Iury`;

    // Today's reminders
    const todayReminders = reminders.filter(r => r.date === today() && !r.done).slice(0,3);
    const rContainer = document.getElementById('dashboardReminders');
    if (todayReminders.length === 0) {
      rContainer.innerHTML = '<div class="empty-state">Nenhum lembrete hoje</div>';
    } else {
      rContainer.innerHTML = todayReminders.map(r => `
        <div class="card" style="padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;">
          <span style="color:var(--primary);font-weight:700;font-size:13px;">${fmtTime(r.iso)}</span>
          <span style="font-size:13px;">${r.title}</span>
        </div>
      `).join('');
    }

    // Pending tasks
    const ptasks = pending.slice(0,4);
    const tContainer = document.getElementById('dashboardTasks');
    if (ptasks.length === 0) {
      tContainer.innerHTML = '<div class="empty-state">Nenhuma tarefa pendente</div>';
    } else {
      tContainer.innerHTML = ptasks.map(t => `
        <div class="card" style="padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;">
          <span style="font-size:13px;flex:1;">${t.title}</span>
          <span class="badge badge-${t.priority||'medium'}">${t.priority||'Média'}</span>
        </div>
      `).join('');
    }
  }

  function renderTasks() {
    const tasks = Store.getTasks();
    const container = document.getElementById('tasksList');
    if (tasks.length === 0) {
      container.innerHTML = '<div class="empty-state"><span class="emoji">📋</span>Nenhuma tarefa ainda</div>';
      return;
    }
    container.innerHTML = tasks.map(t => `
      <div class="task-item">
        <button class="task-check ${t.done?'done':''}" onclick="toggleTask('${t.id}')"></button>
        <div class="task-info">
          <div class="task-title ${t.done?'done':''}">${escHtml(t.title)}</div>
          <div class="task-meta">
            ${t.dueDate ? `<span>📅 ${fmtDate(t.dueDate)}</span>` : ''}
            <span class="badge badge-${t.priority||'medium'}">${t.priority||'Média'}</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="btn-icon danger" onclick="deleteTask('${t.id}')">🗑</button>
        </div>
      </div>
    `).join('');
  }

  function renderReminders() {
    const reminders = Store.getReminders();
    const container = document.getElementById('remindersList');
    if (reminders.length === 0) {
      container.innerHTML = '<div class="empty-state"><span class="emoji">🔔</span>Nenhum lembrete ainda</div>';
      return;
    }
    container.innerHTML = reminders.map(r => `
      <div class="reminder-item">
        <div class="reminder-time">${fmtTime(r.iso)}</div>
        <div class="reminder-info">
          <div class="reminder-title ${r.done?'done':''}">${escHtml(r.title)}</div>
          <div class="reminder-date">${fmtDateFull(r.iso)}</div>
        </div>
        <button class="btn-icon success" onclick="toggleReminder('${r.id}')">${r.done?'↩':'✓'}</button>
        <button class="btn-icon danger" onclick="deleteReminder('${r.id}')">🗑</button>
      </div>
    `).join('');
  }

  function renderNotes() {
    const notes = Store.getNotes();
    const container = document.getElementById('notesGrid');
    if (notes.length === 0) {
      container.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><span class="emoji">📝</span>Nenhuma nota ainda</div>';
      return;
    }
    container.innerHTML = notes.map(n => `
      <div class="note-card">
        <div class="note-text">${escHtml(n.text)}</div>
        <div class="note-date">${fmtDate(n.iso)} ${fmtTime(n.iso)}</div>
        <button class="btn-icon danger note-del" style="width:24px;height:24px;font-size:12px;" onclick="deleteNote('${n.id}')">✕</button>
      </div>
    `).join('');
  }

  function renderAgenda() {
    const tasks = Store.getTasks();
    const reminders = Store.getReminders();
    const today_ = today();
    document.getElementById('agendaDate').textContent = fmtDateFull(new Date());

    const agenda = [
      ...reminders.filter(r => r.date === today_).map(r => ({ type: 'Lembrete', title: r.title, time: r.iso, done: r.done })),
      ...tasks.filter(t => t.dueDate === today_).map(t => ({ type: 'Tarefa', title: t.title, time: t.dueDate+'T00:00', done: t.done }))
    ].sort((a,b) => new Date(a.time) - new Date(b.time));

    const container = document.getElementById('agendaList');
    if (agenda.length === 0) {
      container.innerHTML = '<div class="empty-state"><span class="emoji">📅</span>Nada agendado para hoje</div>';
      return;
    }
    container.innerHTML = agenda.map(a => `
      <div class="agenda-item">
        <div class="agenda-time">${a.type === 'Lembrete' ? fmtTime(a.time) : '📅'}</div>
        <div class="agenda-content">
          <div class="agenda-type">${a.type}</div>
          <div class="agenda-title" style="${a.done?'text-decoration:line-through;color:var(--text-dim);':''}">${escHtml(a.title)}</div>
        </div>
      </div>
    `).join('');
  }

  function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // ===== TASK CRUD =====
  function openTaskModal(task) {
    const t = task || { id: '', title: '', priority: 'medium', dueDate: '' };
    openModal(`
      <h2>${task ? 'Editar' : 'Nova'} Tarefa</h2>
      <input id="modalTaskTitle" placeholder="O que precisa fazer?" value="${escHtml(t.title)}" />
      <div class="row">
        <select id="modalTaskPriority">
          <option value="low" ${t.priority==='low'?'selected':''}>🔵 Baixa</option>
          <option value="medium" ${t.priority==='medium'||!t.priority?'selected':''}>🟡 Média</option>
          <option value="high" ${t.priority==='high'?'selected':''}>🔴 Alta</option>
        </select>
        <input type="date" id="modalTaskDate" value="${t.dueDate}" />
      </div>
      <button class="btn-primary" onclick="saveTask('${t.id}')">Salvar</button>
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
    `);
  }

  function saveTask(id) {
    const title = document.getElementById('modalTaskTitle').value.trim();
    if (!title) return showToast('Digite um título para a tarefa');
    const priority = document.getElementById('modalTaskPriority').value;
    const dueDate = document.getElementById('modalTaskDate').value;
    const tasks = Store.getTasks();
    if (id) {
      const idx = tasks.findIndex(t => t.id === id);
      if (idx >= 0) { tasks[idx] = { ...tasks[idx], title, priority, dueDate }; }
    } else {
      tasks.push({ id: uid(), title, priority, dueDate, done: false, createdAt: now() });
    }
    Store.saveTasks(tasks);
    closeModal(); renderAll(); showToast(id ? 'Tarefa atualizada ✓' : 'Tarefa criada ✓');
  }

  function toggleTask(id) {
    const tasks = Store.getTasks();
    const t = tasks.find(x => x.id === id);
    if (t) { t.done = !t.done; Store.saveTasks(tasks); renderAll(); }
  }

  function deleteTask(id) {
    let tasks = Store.getTasks();
    tasks = tasks.filter(t => t.id !== id);
    Store.saveTasks(tasks); renderAll(); showToast('Tarefa removida');
  }

  // ===== REMINDER CRUD =====
  function openReminderModal(reminder) {
    const r = reminder || { id: '', title: '', iso: '' };
    const defaultDate = r.iso ? r.iso.slice(0,16) : '';
    openModal(`
      <h2>${reminder ? 'Editar' : 'Novo'} Lembrete</h2>
      <input id="modalRemTitle" placeholder="Do que lembrar?" value="${escHtml(r.title)}" />
      <input type="datetime-local" id="modalRemDate" value="${defaultDate}" />
      <button class="btn-primary" onclick="saveReminder('${r.id}')">Salvar</button>
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
    `);
  }

  function saveReminder(id) {
    const title = document.getElementById('modalRemTitle').value.trim();
    if (!title) return showToast('Digite o lembrete');
    const dt = document.getElementById('modalRemDate').value;
    if (!dt) return showToast('Escolha data e hora');
    const iso = new Date(dt).toISOString();
    const reminders = Store.getReminders();
    if (id) {
      const idx = reminders.findIndex(r => r.id === id);
      if (idx >= 0) reminders[idx] = { ...reminders[idx], title, iso, date: iso.slice(0,10) };
    } else {
      reminders.push({ id: uid(), title, iso, date: iso.slice(0,10), done: false, createdAt: now() });
    }
    Store.saveReminders(reminders);
    closeModal(); renderAll(); showToast(id ? 'Lembrete atualizado ✓' : 'Lembrete criado ✓');
    checkReminders();
  }

  function toggleReminder(id) {
    const reminders = Store.getReminders();
    const r = reminders.find(x => x.id === id);
    if (r) { r.done = !r.done; Store.saveReminders(reminders); renderAll(); }
  }

  function deleteReminder(id) {
    let reminders = Store.getReminders();
    reminders = reminders.filter(r => r.id !== id);
    Store.saveReminders(reminders); renderAll(); showToast('Lembrete removido');
  }

  // ===== NOTE CRUD =====
  function openNoteModal() {
    openModal(`
      <h2>Nova Nota</h2>
      <textarea id="modalNoteText" placeholder="Digite sua nota..." style="min-height:120px;"></textarea>
      <button class="btn-primary" onclick="saveNote()">Salvar</button>
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
    `);
  }

  function saveNote() {
    const text = document.getElementById('modalNoteText').value.trim();
    if (!text) return showToast('Digite o conteúdo da nota');
    const notes = Store.getNotes();
    notes.unshift({ id: uid(), text, iso: now() });
    Store.saveNotes(notes); closeModal(); renderAll(); showToast('Nota salva ✓');
  }

  function deleteNote(id) {
    let notes = Store.getNotes();
    notes = notes.filter(n => n.id !== id);
    Store.saveNotes(notes); renderAll(); showToast('Nota removida');
  }

  // ===== COMMAND PROCESSOR =====
  function processCommand() {
    const input = document.getElementById('cmdInput');
    const cmd = input.value.trim().toLowerCase();
    if (!cmd) return;
    input.value = '';
    showToast('⏳ Processando...');

    // Task commands
    if (cmd.startsWith('adicionar tarefa') || cmd.startsWith('nova tarefa') || cmd.startsWith('criar tarefa')) {
      const title = cmd.replace(/^(adicionar tarefa|nova tarefa|criar tarefa)\s*/i, '');
      if (title) {
        const tasks = Store.getTasks();
        tasks.push({ id: uid(), title, priority: 'medium', dueDate: '', done: false, createdAt: now() });
        Store.saveTasks(tasks); renderAll(); showToast('✅ Tarefa adicionada!');
      } else { showToast('Digite: adicionar tarefa [descrição]'); }
    }
    // Reminder commands
    else if (cmd.startsWith('lembrete') || cmd.startsWith('me lembre')) {
      const rest = cmd.replace(/^(lembrete|me lembre)\s*/i, '');
      if (rest) {
        const reminders = Store.getReminders();
        const iso = new Date(Date.now() + 3600000).toISOString();
        reminders.push({ id: uid(), title: rest, iso, date: iso.slice(0,10), done: false, createdAt: now() });
        Store.saveReminders(reminders); renderAll(); showToast('✅ Lembrete criado (1h)');
      } else { showToast('Digite: lembrete [descrição]'); }
    }
    // Note commands
    else if (cmd.startsWith('nota') || cmd.startsWith('anotar')) {
      const text = cmd.replace(/^(nota|anotar)\s*/i, '');
      if (text) {
        const notes = Store.getNotes();
        notes.unshift({ id: uid(), text, iso: now() });
        Store.saveNotes(notes); renderAll(); showToast('✅ Nota salva!');
      } else { showToast('Digite: nota [texto]'); }
    }
    // Navigation
    else if (cmd.includes('início') || cmd.includes('dashboard') || cmd.includes('home')) { goToPage('dashboard'); showToast('🏠 Início'); }
    else if (cmd.includes('tarefa')) { goToPage('tasks'); showToast('📋 Tarefas'); }
    else if (cmd.includes('lembrete')) { goToPage('reminders'); showToast('🔔 Lembretes'); }
    else if (cmd.includes('nota')) { goToPage('notes'); showToast('📝 Notas'); }
    else if (cmd.includes('agenda') || cmd.includes('hoje') || cmd.includes('calendário')) { goToPage('agenda'); showToast('📅 Agenda'); }
    // Help
    else if (cmd.includes('ajuda') || cmd.includes('comandos') || cmd.includes('help')) {
      showToast('Comandos: tarefa, lembrete, nota, início, agenda, ajuda');
    }
    else {
      showToast('❓ Comando não reconhecido. Digite "ajuda" para ver os comandos.');
    }
  }

  // ===== REMINDER CHECK =====
  function checkReminders() {
    const reminders = Store.getReminders().filter(r => !r.done);
    const now_ = new Date();
    reminders.forEach(r => {
      const rt = new Date(r.iso);
      if (rt &lt;= now_ && (rt.getTime() > now_.getTime() - 120000)) {
        showToast(`🔔 Lembrete: ${r.title}`);
        const r2 = Store.getReminders();
        const found = r2.find(x => x.id === r.id);
        if (found) { found.done = true; Store.saveReminders(r2); }
      }
    });
  }

  // ===== COMMAND BAR ENTER KEY =====
  document.getElementById('cmdInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') processCommand();
  });

  // ===== INIT =====
  renderAll();

  // Periodically check reminders
  setInterval(checkReminders, 15000);
  checkReminders();

  // Update greeting every minute
  setInterval(() => {
    const h = new Date().getHours();
    let g = 'Boa noite';
    if (h &lt; 12) g = 'Bom dia';
    else if (h &lt; 18) g = 'Boa tarde';
    document.getElementById('greeting').textContent = `${g}, Iury`;
  }, 60000);

  // ===== PWA SERVICE WORKER =====
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  console.log('✦ J.A.R.V.I.S. Assistente Pessoal — Online');
</script>
</body>
</html>
