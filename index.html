<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <title>J.A.R.V.I.S. — Assistente Pessoal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a0a1a; color: #e0e7ff; }
    :root {
      --bg: #0a0a1a; --bg2: #12122a; --bg3: #1a1a3a;
      --primary: #00e5ff; --primary-dim: rgba(0,229,255,0.15); --primary-glow: rgba(0,229,255,0.3);
      --secondary: #7c3aed; --text: #e0e7ff; --text-dim: #6b7280;
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --radius: 16px; --radius-sm: 10px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --nav-height: 64px; --header-height: 56px;
    }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--primary-dim); border-radius: 4px; }
    .app { height: 100%; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; }
    header {
      height: var(--header-height); display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; background: var(--bg2); border-bottom: 1px solid rgba(0,229,255,0.1);
      position: relative; z-index: 10; flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #00e5ff, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
    header .status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
    header .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .page-container { flex: 1; overflow: hidden; position: relative; }
    .page { display: none; height: 100%; overflow-y: auto; padding: 16px 16px 80px; animation: fadeIn 0.3s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      height: calc(var(--nav-height) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: linear-gradient(180deg, rgba(10,10,26,0.95) 0%, rgba(18,18,42,0.98) 100%);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,229,255,0.08); display: flex; align-items: center; justify-content: space-around;
      max-width: 480px; margin: 0 auto; left: 50%; transform: translateX(-50%);
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 4px 8px; cursor: pointer; transition: 0.2s; border: none; background: none; color: var(--text-dim); font-size: 10px; font-family: inherit; min-width: 56px; }
    .nav-item .icon { font-size: 22px; line-height: 1; transition: 0.2s; }
    .nav-item.active { color: var(--primary); }
    .nav-item.active .icon { filter: drop-shadow(0 0 8px var(--primary-glow)); }
    .cmd-bar {
      position: fixed; bottom: calc(var(--nav-height) + var(--safe-bottom) + 4px);
      left: 50%; transform: translateX(-50%); z-index: 90;
      width: calc(100% - 32px); max-width: 448px;
      display: flex; align-items: center; gap: 8px;
      background: rgba(26,26,58,0.9); backdrop-filter: blur(16px);
      border: 1px solid rgba(0,229,255,0.15); border-radius: 50px;
      padding: 6px 6px 6px 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px rgba(0,229,255,0.05);
    }
    .cmd-bar input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 14px; font-family: inherit;
      padding: 8px 0; min-width: 0;
    }
    .cmd-bar input::placeholder { color: var(--text-dim); font-size: 13px; }
    .cmd-bar button {
      width: 42px; height: 42px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff; font-size: 18px; cursor: pointer; transition: 0.2s;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px rgba(0,229,255,0.2);
    }
    .cmd-bar button:active { transform: scale(0.92); }
    .card { background: var(--bg2); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid rgba(0,229,255,0.06); }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 50px; font-size: 11px; font-weight: 600; }
    .badge-high { background: rgba(239,68,68,0.2); color: var(--danger); }
    .badge-medium { background: rgba(245,158,11,0.2); color: var(--warning); }
    .badge-low { background: rgba(16,185,129,0.2); color: var(--success); }
    .badge-done { background: rgba(16,185,129,0.15); color: var(--success); text-decoration: line-through; }
    .btn-icon { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--bg3); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.15s; }
    .btn-icon:active { transform: scale(0.9); }
    .btn-icon.danger { color: var(--danger); }
    .btn-icon.success { color: var(--success); }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; display: block; }
    .greeting { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .sub-greeting { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .stat-card { background: var(--bg2); border-radius: var(--radius-sm); padding: 14px 10px; text-align: center; border: 1px solid rgba(0,229,255,0.06); }
    .stat-card .num { font-size: 24px; font-weight: 800; color: var(--primary); }
    .stat-card .label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .section-title { font-size: 14px; font-weight: 600; margin: 16px 0 10px; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .task-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .task-item:last-child { border-bottom: none; }
    .task-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.15s; background: none; }
    .task-check.done { border-color: var(--success); background: var(--success); }
    .task-check.done::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 700; }
    .task-info { flex: 1; min-width: 0; }
    .task-title { font-size: 14px; font-weight: 500; }
    .task-title.done { text-decoration: line-through; color: var(--text-dim); }
    .task-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; display: flex; gap: 8px; }
    .task-actions { display: flex; gap: 4px; }
    .add-card { border: 1px dashed rgba(0,229,255,0.15); cursor: pointer; text-align: center; color: var(--text-dim); font-size: 13px; padding: 14px; border-radius: var(--radius-sm); transition: 0.2s; margin-top: 8px; }
    .add-card:hover { border-color: var(--primary-dim); color: var(--primary); }
    .reminder-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .reminder-time { font-size: 12px; font-weight: 700; color: var(--primary); min-width: 48px; }
    .reminder-info { flex: 1; }
    .reminder-title { font-size: 14px; }
    .reminder-date { font-size: 11px; color: var(--text-dim); }
    .notes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .note-card { background: var(--bg2); border-radius: var(--radius-sm); padding: 14px; border: 1px solid rgba(0,229,255,0.06); position: relative; min-height: 80px; }
    .note-card .note-text { font-size: 13px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    .note-card .note-date { font-size: 10px; color: var(--text-dim); margin-top: 8px; }
    .note-card .note-del { position: absolute; top: 6px; right: 6px; }
    .agenda-today-label { font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 12px; }
    .agenda-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); align-items: flex-start; }
    .agenda-time { font-size: 12px; font-weight: 600; color: var(--text-dim); min-width: 44px; padding-top: 2px; }
    .agenda-content { flex: 1; }
    .agenda-type { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--secondary); font-weight: 600; }
    .agenda-title { font-size: 14px; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 200; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg2); border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-width: 480px; max-height: 85vh; padding: 24px 20px calc(20px + var(--safe-bottom)); overflow-y: auto; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal h2 { font-size: 18px; margin-bottom: 16px; }
    .modal input, .modal textarea, .modal select {
      width: 100%; padding: 12px 14px; border-radius: var(--radius-sm); border: 1px solid rgba(0,229,255,0.12);
      background: var(--bg3); color: var(--text); font-size: 14px; font-family: inherit; margin-bottom: 12px; outline: none; transition: 0.15s;
    }
    .modal input:focus, .modal textarea:focus { border-color: var(--primary); }
    .modal textarea { min-height: 80px; resize: vertical; }
    .modal .row { display: flex; gap: 10px; }
    .modal .row > * { flex: 1; }
    .modal .btn-primary {
      width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: 0.15s;
    }
    .modal .btn-primary:active { transform: scale(0.97); }
    .modal .btn-secondary {
      width: 100%; padding: 14px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.08);
      background: transparent; color: var(--text-dim); font-size: 14px; cursor: pointer; font-family: inherit; margin-top: 8px;
    }
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 300;
      background: var(--bg2); border: 1px solid rgba(0,229,255,0.15); border-radius: var(--radius-sm);
      padding: 14px 20px; color: var(--text); font-size: 13px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4); display: none;
      max-width: calc(100% - 40px); text-align: center;
      backdrop-filter: blur(12px);
    }
    .toast.show { display: block; animation: toastIn 0.3s ease; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>

<div class="app" id="app">
  <header>
    <h1>✦ J.A.R.V.I.S.</h1>
    <div class="status">
      <span class="status-dot"></span>
      <span>Online</span>
    </div>
  </header>

  <div class="page-container">
    <div class="page active" id="page-dashboard">
      <div class="greeting" id="greeting">Olá, Iury</div>
      <div class="sub-greeting" id="subGreeting">Aqui está seu resumo do dia</div>
      <div class="stats-row">
        <div class="stat-card"><div class="num" id="statTasks">0</div><div class="label">Tarefas</div></div>
        <div class="stat-card"><div class="num" id="statReminders">0</div><div class="label">Lembretes</div></div>
        <div class="stat-card"><div class="num" id="statNotes">0</div><div class="label">Notas</div></div>
      </div>
      <div class="section-title">⚡ Próximos lembretes</div>
      <div id="dashboardReminders"><div class="empty-state">Nenhum lembrete hoje</div></div>
      <div class="section-title">📋 Tarefas pendentes</div>
      <div id="dashboardTasks"><div class="empty-state">Nenhuma tarefa pendente</div></div>
    </div>

    <div class="page" id="page-tasks">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="section-title" style="margin:0;">📋 Tarefas</div>
        <button class="btn-icon success" onclick="openTaskModal()" style="width:auto;padding:6px 14px;border-radius:50px;gap:4px;font-size:13px;">+ Nova</button>
      </div>
      <div id="tasksList"></div>
      <div class="add-card" onclick="openTaskModal()">+ Adicionar tarefa</div>
    </div>

    <div class="page" id="page-reminders">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="section-title" style="margin:0;">🔔 Lembretes</div>
        <button class="btn-icon success" onclick="openReminderModal()" style="width:auto;padding:6px 14px;border-radius:50px;gap:4px;font-size:13px;">+ Novo</button>
      </div>
      <div id="remindersList"></div>
      <div class="add-card" onclick="openReminderModal()">+ Adicionar lembrete</div>
    </div>

    <div class="page" id="page-notes">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="section-title" style="margin:0;">📝 Notas</div>
        <button class="btn-icon success" onclick="openNoteModal()" style="width:auto;padding:6px 14px;border-radius:50px;gap:4px;font-size:13px;">+ Nova</button>
      </div>
      <div class="notes-grid" id="notesGrid"></div>
      <div class="add-card" onclick="openNoteModal()" style="margin-top:0;">+ Adicionar nota</div>
    </div>

    <div class="page" id="page-agenda">
      <div class="section-title" style="margin:0 0 4px;">📅 Agenda</div>
      <div class="agenda-today-label" id="agendaDate">Hoje</div>
      <div id="agendaList"></div>
    </div>
  </div>

  <div class="cmd-bar">
    <input type="text" id="cmdInput" placeholder="O que você precisa, Iury?" autocomplete="off" />
    <button onclick="processCommand()">➤</button>
  </div>

  <nav>
    <button class="nav-item active" data-page="dashboard"><span class="icon">🏠</span>Início</button>
    <button class="nav-item" data-page="tasks"><span class="icon">📋</span>Tarefas</button>
    <button class="nav-item" data-page="reminders"><span class="icon">🔔</span>Lembretes</button>
    <button class="nav-item" data-page="notes"><span class="icon">📝</span>Notas</button>
    <button class="nav-item" data-page="agenda"><span class="icon">📅</span>Agenda</button>
  </nav>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const Store = {
    get() {
      try {
        const d = localStorage.getItem('jarvis_data');
        return d ? JSON.parse(d) : { tasks: [], reminders: [], notes: [] };
      } catch { return { tasks: [], reminders: [], notes: [] }; }
    },
    set(data) { localStorage.setItem('jarvis_data', JSON.stringify(data)); },
    getTasks() { return this.get().tasks; },
    getReminders() { return this.get().reminders; },
    getNotes() { return this.get().notes; },
    saveTasks(t) { const d = this.get(); d.tasks = t; this.set(d); },
    saveReminders(r) { const d = this.get(); d.reminders = r; this.set(d); },
    saveNotes(n) { const d = this.get(); d.notes = n; this.set(d); }
  };

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
  function today() { return new Date().toISOString().slice(0,10); }
  function now() { return new Date().toISOString(); }
  function fmtTime(iso) { const d = new Date(iso); return d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}); }
  function fmtDate(iso) { const d = new Date(iso); return d.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'}); }
  function fmtDateFull(iso) { const d = new Date(iso); return d.toLocaleDateString('pt-BR', {weekday:'long',day:'numeric',month:'long'}); }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  function openModal(html) {
    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modalOverlay').classList.add('open');
  }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });

  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      const page = document.getElementById('page-' + btn.dataset.page);
      if (page) { page.classList.add('active'); renderAll(); }
    });
  });

  function goToPage(name) {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelector(`.nav-item[data-page="${name}"]`)?.classList.add('active');
    document.getElementById('page-' + name)?.classList.add('active');
    renderAll();
  }

  function renderAll() {
    renderDashboard(); renderTasks(); renderReminders(); renderNotes(); renderAgenda();
  }

  function renderDashboard() {
    const tasks = Store.getTasks();
    const reminders = Store.getReminders();
    const notes = Store.getNotes();
    const pending = tasks.filter(t => !t.done);
    document.getElementById('statTasks').textContent = pending.length;
    document.getElementById('statReminders').textContent = reminders.filter(r => !r.done).length;
    document.getElementById('statNotes').textContent = notes.length;
    const h = new Date().getHours();
    let g = 'Boa noite';
    if (h < 12) g = 'Bom dia';
    else if (h < 18) g = 'Boa tarde';
    document.getElementById('greeting').textContent = g + ', Iury';
    const todayReminders = reminders.filter(r => r.date === today() && !r.done).slice(0,3);
    const rContainer = document.getElementById('dashboardReminders');
    if (todayReminders.length === 0) {
      rContainer.innerHTML = '<div class="empty-state">Nenhum lembrete hoje</div>';
    } else {
      rContainer.innerHTML = todayReminders.map(r =>
        '<div class="card" style="padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;">' +
          '<span
